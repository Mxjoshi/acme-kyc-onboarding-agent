# Render blueprint - one file that tells Render how to run this app.
# The app lives in 03-build/app/, so rootDir points Render there.
# In Render: New + -> Blueprint -> connect this repo -> it reads this file.
# The only thing you set by hand is the secret API key (sync: false below) in the dashboard.
services:
  - type: web
    name: kyc-onboarding-agent
    runtime: node
    plan: free
    region: frankfurt # closest Render region to the UAE
    rootDir: 03-build/app # the Next.js app is nested under the phase folders
    buildCommand: npm install && npm run build
    startCommand: npm run start # next start reads PORT from the env and binds 0.0.0.0 automatically
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false # you paste the key in the Render dashboard; it is never stored in git
      - key: NODE_VERSION
        value: "20.18.0"
